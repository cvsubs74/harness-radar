name: ci

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Make harness scripts executable
        run: chmod +x harness/*.sh scripts/*.sh .claude/hooks/*.sh

      # The devops agent extends this job during /kickoff with stack-specific
      # setup (setup-node, setup-python, etc.) and dep caching.

      - name: init
        run: bash harness/init.sh

      - name: verify
        run: bash harness/verify.sh
