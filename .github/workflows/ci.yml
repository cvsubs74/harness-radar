name: ci

on:
  pull_request:
    branches: [main]
  push:

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: pyproject.toml

      - name: Make harness scripts executable
        run: chmod +x harness/*.sh scripts/*.sh .claude/hooks/*.sh

      - name: Confirm gh is available
        run: gh --version

      - name: Confirm jq is available
        run: jq --version

      - name: init
        env:
          GH_TOKEN: ${{ github.token }}
        run: bash harness/init.sh

      - name: verify
        run: bash harness/verify.sh
